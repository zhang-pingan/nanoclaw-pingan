<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NanoClaw</title>
  <link rel="stylesheet" href="/styles/main.css" />
  <!-- Markdown rendering via CDN (no bundle needed for Electron) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script>
    // Load common languages for syntax highlighting
    const hljsLanguages = ['javascript', 'typescript', 'python', 'bash', 'json', 'yaml', 'xml', 'sql', 'go', 'rust', 'java'];
    hljsLanguages.forEach((lang) => {
      const script = document.createElement('script');
      script.src = `https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/${lang}.min.js`;
      document.head.appendChild(script);
    });
  </script>
</head>
<body>
  <div id="app">
    <!-- Main app -->
    <div id="main-screen" class="screen">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">NanoClaw</span>
          <button id="sidebar-collapse" title="Collapse sidebar">&#8249;</button>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <span>Groups</span>
            <button id="refresh-groups" title="Refresh groups">&#10227;</button>
          </div>
          <div id="groups-list" class="list">
            <!-- Populated by JS -->
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-header">
            <span>Tasks</span>
          </div>
          <div id="tasks-list" class="list">
            <!-- Populated by JS -->
          </div>
        </div>

        <div class="sidebar-footer">
          <div id="connection-status" class="conn-status disconnected">
            <span class="conn-dot"></span>
            <span class="conn-label">Disconnected</span>
          </div>
        </div>
      </aside>

      <!-- Chat area -->
      <main id="chat-area">
        <!-- Chat header -->
        <div id="chat-header">
          <div id="chat-group-info">
            <span id="chat-group-name">Select a group</span>
            <span id="chat-group-folder" class="muted"></span>
          </div>
          <div class="header-actions">
            <button id="popout-btn" class="btn-ghost" title="Open in new window">&#10697;</button>
            <button id="clear-chat" class="btn-ghost" title="Clear context">&#128465;</button>
          </div>
        </div>

        <!-- Messages -->
        <div id="messages">
          <div id="messages-empty">
            <p>Select a group from the sidebar to start chatting</p>
          </div>
        </div>

        <!-- Typing indicator -->
        <div id="typing-indicator" class="hidden">
          <span class="typing-dots">
            <span></span><span></span><span></span>
          </span>
          <span class="typing-text">Agent is typing...</span>
        </div>

        <!-- Input area -->
        <div id="input-area">
          <!-- Command palette (floating above input) -->
          <div id="command-palette"></div>

          <!-- Reply preview bar -->
          <div id="reply-preview">
            <span id="reply-preview-content"></span>
            <button id="reply-preview-close" title="Cancel reply">&times;</button>
          </div>

          <div id="file-drop-zone" class="hidden">
            <span>Drop files here to upload</span>
          </div>

          <!-- Markdown toolbar -->
          <div class="md-toolbar">
            <button data-md="bold" title="Bold (Ctrl+B)"><b>B</b></button>
            <button data-md="italic" title="Italic (Ctrl+I)"><i>I</i></button>
            <button data-md="code" title="Inline code">`</button>
            <button data-md="codeblock" title="Code block">{ }</button>
            <button data-md="link" title="Link (Ctrl+K)">&#128279;</button>
            <button data-md="list" title="List">&bull;</button>
          </div>

          <div class="input-row">
            <button id="attach-btn" class="btn-ghost" title="Attach file">&#128206;</button>
            <input id="file-input" type="file" multiple class="hidden" />
            <textarea
              id="message-input"
              placeholder="Send a message... (Shift+Enter for new line)"
              rows="1"
              autofocus
            ></textarea>
            <button id="send-btn" class="btn-primary" title="Send (Enter)">&uarr;</button>
          </div>
          <div class="input-hint">
            <kbd>Enter</kbd> send &nbsp;&middot;&nbsp; <kbd>Shift+Enter</kbd> newline &nbsp;&middot;&nbsp;
            <kbd>/</kbd> agent command
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/dist/app.js"></script>
</body>
</html>
