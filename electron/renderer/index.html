<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NanoClaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
  <!-- Markdown rendering via CDN (no bundle needed for Electron) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script>
    // Load common languages for syntax highlighting
    const hljsLanguages = ['javascript', 'typescript', 'python', 'bash', 'json', 'yaml', 'xml', 'sql', 'go', 'rust', 'java'];
    hljsLanguages.forEach((lang) => {
      const script = document.createElement('script');
      script.src = `https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/${lang}.min.js`;
      document.head.appendChild(script);
    });
  </script>
</head>
<body>
  <div id="app">
    <!-- Main app -->
    <div id="main-screen" class="screen">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">NanoClaw</span>
          <button id="sidebar-collapse" class="icon-btn" title="Collapse sidebar">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
          </button>
        </div>

        <div class="section-header">
          <span>Groups</span>
          <button id="refresh-groups" class="icon-btn" title="Refresh groups">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 4 23 10 17 10"></polyline>
              <polyline points="1 20 1 14 7 14"></polyline>
              <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
            </svg>
          </button>
        </div>
        <div class="sidebar-section">
          <div id="groups-list" class="list">
            <!-- Populated by JS -->
          </div>
        </div>

        <button id="open-schedulers" class="section-header schedulers-btn">
          <span>Schedulers</span>
          <svg class="icon panel-arrow schedulers-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>

        <button id="open-agent-status" class="section-header agent-status-btn">
          <span>Agent Status</span>
          <svg class="icon panel-arrow agent-status-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>

        <button id="open-workflows" class="section-header workflows-btn">
          <span>Workflows</span>
          <svg class="icon panel-arrow workflows-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>

        <div class="sidebar-footer">
          <div id="connection-status" class="conn-status disconnected">
            <span class="conn-dot"></span>
            <span class="conn-label">Disconnected</span>
          </div>
        </div>
      </aside>

      <!-- Schedulers panel -->
      <div id="schedulers-panel">
        <div class="schedulers-header">
          <span>Schedulers</span>
          <div class="schedulers-header-actions">
            <button id="delete-all-schedulers" class="icon-btn danger" title="Delete All">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
              </svg>
            </button>
            <button id="close-schedulers" class="icon-btn" title="Close">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
        <div id="schedulers-list"></div>
      </div>

      <!-- Agent Status panel -->
      <div id="agent-status-panel">
        <div class="agent-status-header">
          <span>Agent Status</span>
          <button id="close-agent-status" class="icon-btn" title="Close">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div id="agent-status-list"></div>
      </div>

      <!-- Workflows panel -->
      <div id="workflows-panel">
        <div class="workflows-header">
          <span>Workflows</span>
          <div class="workflows-header-actions">
            <button id="refresh-workflows" class="icon-btn" title="Refresh">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"></polyline>
                <polyline points="1 20 1 14 7 14"></polyline>
                <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
              </svg>
            </button>
            <button id="delete-all-workflows" class="icon-btn danger" title="Delete All">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"></polyline>
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
                <path d="M10 11v6"></path>
                <path d="M14 11v6"></path>
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"></path>
              </svg>
            </button>
            <button id="close-workflows" class="icon-btn" title="Close">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
        <div id="workflows-list"></div>
      </div>

      <!-- Chat area -->
      <main id="chat-area">
        <!-- Chat header -->
        <div id="chat-header">
          <div id="chat-group-info">
            <span id="chat-group-name">Select a group</span>
            <span id="chat-group-folder" class="muted"></span>
          </div>
          <div class="header-actions">
            <button id="select-mode-btn" class="icon-btn" title="多选消息">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"></rect>
                <rect x="14" y="3" width="7" height="7"></rect>
                <rect x="14" y="14" width="7" height="7"></rect>
                <rect x="3" y="14" width="7" height="7"></rect>
              </svg>
            </button>
          </div>
        </div>

        <!-- Messages -->
        <div id="messages">
          <div id="messages-empty">
            <p>Select a group from the sidebar to start chatting</p>
          </div>
        </div>

        <!-- Typing indicator -->
        <div id="typing-indicator" class="hidden">
          <span class="typing-dots">
            <span></span><span></span><span></span>
          </span>
          <span class="typing-text">Agent is typing...</span>
        </div>

        <!-- Multi-select toolbar -->
        <div id="multi-select-bar">
          <span id="selected-count">已选 0 条</span>
          <div class="multi-select-actions">
            <button id="copy-selected-btn" class="btn-primary" disabled>复制</button>
            <button id="cancel-select-btn" class="btn-ghost">取消</button>
          </div>
        </div>

        <!-- Input area -->
        <div id="input-area">
          <!-- Command palette (floating above input) -->
          <div id="command-palette"></div>

          <!-- Reply preview bar -->
          <div id="reply-preview">
            <span id="reply-preview-content"></span>
            <button id="reply-preview-close" class="icon-btn-sm" title="Cancel reply">
              <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          <!-- Pending files preview bar -->
          <div id="pending-files-preview">
            <span id="pending-files-content"></span>
            <button id="pending-files-close" class="icon-btn-sm" title="取消附件">
              <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>

          <div id="file-drop-zone" class="hidden">
            <span>Drop files here to upload</span>
          </div>

          <div class="input-row">
            <div id="input-wrap">
              <textarea
                id="message-input"
                placeholder="Enter 发送  ·  Shift+Enter 换行  ·  / 召唤命令"
                rows="1"
                autofocus
              ></textarea>
              <div id="input-actions">
                <button id="format-toggle-btn" class="icon-btn" title="格式">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 7V4h16v3"></path>
                    <path d="M9 20h6"></path>
                    <path d="M12 4v16"></path>
                  </svg>
                </button>
                <div id="format-sub-btns" class="hidden">
                  <button id="fmt-ol-btn" class="icon-btn" title="有序列表 (⌘⇧7)">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="10" y1="6" x2="21" y2="6"></line>
                      <line x1="10" y1="12" x2="21" y2="12"></line>
                      <line x1="10" y1="18" x2="21" y2="18"></line>
                      <path d="M4 6h1v4"></path>
                      <path d="M4 10h2"></path>
                      <path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1"></path>
                    </svg>
                  </button>
                  <button id="fmt-ul-btn" class="icon-btn" title="无序列表 (⌘⇧8)">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="9" y1="6" x2="20" y2="6"></line>
                      <line x1="9" y1="12" x2="20" y2="12"></line>
                      <line x1="9" y1="18" x2="20" y2="18"></line>
                      <circle cx="4" cy="6" r="1" fill="currentColor" stroke="none"></circle>
                      <circle cx="4" cy="12" r="1" fill="currentColor" stroke="none"></circle>
                      <circle cx="4" cy="18" r="1" fill="currentColor" stroke="none"></circle>
                    </svg>
                  </button>
                </div>
                <button id="attach-btn" class="icon-btn" title="附件">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                  </svg>
                </button>
                <button id="at-btn" class="icon-btn" title="@ 提及">
                  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"></circle>
                    <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path>
                  </svg>
                </button>
                <button id="send-btn" class="send-btn" title="发送 (Enter)">
                  <svg class="icon-send" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                  </svg>
                </button>
              </div>
            </div>
            <input id="file-input" type="file" multiple hidden />
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/dist/app.js"></script>
</body>
</html>
