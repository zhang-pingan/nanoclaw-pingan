<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NanoClaw</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/main.css" />
  <!-- Markdown rendering via CDN (no bundle needed for Electron) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css"
  />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/core.min.js"></script>
  <script>
    // Load common languages for syntax highlighting
    const hljsLanguages = ['javascript', 'typescript', 'python', 'bash', 'json', 'yaml', 'xml', 'sql', 'go', 'rust', 'java'];
    hljsLanguages.forEach((lang) => {
      const script = document.createElement('script');
      script.src = `https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/languages/${lang}.min.js`;
      document.head.appendChild(script);
    });
  </script>
</head>
<body>
  <div id="app">
    <!-- Main app -->
    <div id="main-screen" class="screen">
      <!-- Sidebar -->
      <aside id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-title">NanoClaw</span>
          <button id="sidebar-collapse" title="Collapse sidebar">&#8249;</button>
        </div>

        <div class="section-header">
          <span>Groups</span>
          <button id="refresh-groups" title="Refresh groups">&#10227;</button>
        </div>
        <div class="sidebar-section">
          <div id="groups-list" class="list">
            <!-- Populated by JS -->
          </div>
        </div>

        <button id="open-schedulers" class="section-header schedulers-btn">
          <span>Schedulers</span>
          <span class="schedulers-arrow">&#8250;</span>
        </button>

        <div class="sidebar-footer">
          <div id="connection-status" class="conn-status disconnected">
            <span class="conn-dot"></span>
            <span class="conn-label">Disconnected</span>
          </div>
        </div>
      </aside>

      <!-- Schedulers panel -->
      <div id="schedulers-panel">
        <div class="schedulers-header">
          <span>Schedulers</span>
          <button id="close-schedulers" title="Close">&#10005;</button>
        </div>
        <div id="schedulers-list"></div>
      </div>

      <!-- Chat area -->
      <main id="chat-area">
        <!-- Chat header -->
        <div id="chat-header">
          <div id="chat-group-info">
            <span id="chat-group-name">Select a group</span>
            <span id="chat-group-folder" class="muted"></span>
          </div>
          <div class="header-actions">
          </div>
        </div>

        <!-- Messages -->
        <div id="messages">
          <div id="messages-empty">
            <p>Select a group from the sidebar to start chatting</p>
          </div>
        </div>

        <!-- Typing indicator -->
        <div id="typing-indicator" class="hidden">
          <span class="typing-dots">
            <span></span><span></span><span></span>
          </span>
          <span class="typing-text">Agent is typing...</span>
        </div>

        <!-- Input area -->
        <div id="input-area">
          <!-- Command palette (floating above input) -->
          <div id="command-palette"></div>

          <!-- Reply preview bar -->
          <div id="reply-preview">
            <span id="reply-preview-content"></span>
            <button id="reply-preview-close" title="Cancel reply">&times;</button>
          </div>

          <div id="file-drop-zone" class="hidden">
            <span>Drop files here to upload</span>
          </div>

          <div class="input-row">
            <div id="input-wrap">
              <textarea
                id="message-input"
                placeholder="Enter 发送  ·  Shift+Enter 换行  ·  / 召唤命令"
                rows="1"
                autofocus
              ></textarea>
              <div id="input-actions">
                <button id="attach-btn" class="btn-tool" title="附件">&#128206;</button>
                <button id="at-btn" class="btn-tool" title="@ 提及">@</button>
                <button id="send-btn" class="btn-primary" title="发送 (Enter)">&#10148;</button>
              </div>
            </div>
            <input id="file-input" type="file" multiple hidden />
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module" src="/dist/app.js"></script>
</body>
</html>
